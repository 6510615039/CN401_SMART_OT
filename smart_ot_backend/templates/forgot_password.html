{% extends "base.html" %}
{% block title %}ลืมรหัสผ่าน{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;background:white;">
  <div style="width:55%;background:var(--tu-red);display:flex;align-items:center;justify-content:center;">
    <h1 style="color:var(--tu-yellow);font-size:36px;">SMART OT SYSTEM</h1>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:32px;">
    <div style="width:100%;max-width:400px;">
      <h1 style="margin:0 0 8px;">ลืมรหัสผ่าน</h1>
      <p style="color:var(--neutral-500);margin:0 0 32px;">กรอกอีเมลที่ลงทะเบียนไว้ ระบบจะส่งลิงก์รีเซ็ตให้</p>
      {% if sent %}
      <div class="alert-blue"><i data-lucide="check-circle-2" style="width:18px;height:18px;"></i><p style="margin:0;">ส่งลิงก์รีเซ็ตไปที่อีเมลของคุณแล้ว</p></div>
      {% else %}
      <form method="post">{% csrf_token %}
        <div style="margin-bottom:16px;"><label>อีเมล TU</label><input type="email" name="email" placeholder="username@tu.ac.th" required /></div>
        <button type="submit" class="btn-red" style="width:100%;height:48px;justify-content:center;">ส่งลิงก์รีเซ็ต</button>
      </form>
      {% endif %}
      <a href="{% url 'login' %}" style="display:block;text-align:center;margin-top:16px;color:var(--tu-red);font-weight:500;text-decoration:none;">← กลับไปเข้าสู่ระบบ</a>
    </div>
  </div>
</div>
{% endblock %}
