server {
    listen ${PORT};
    server_name _;
    client_max_body_size 20M;
    resolver 8.8.8.8 valid=30s;

    # React app
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Django
    location /api/ {
        proxy_pass https://cn401smartot-production.up.railway.app;
        proxy_set_header Host cn401smartot-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Proxy WebSocket to Django Channels
    location /ws/ {
        proxy_pass https://cn401smartot-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host cn401smartot-production.up.railway.app;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Django static files
    location /static/ {
        proxy_pass https://cn401smartot-production.up.railway.app/static/;
        proxy_set_header Host cn401smartot-production.up.railway.app;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Django media files
    location /media/ {
        proxy_pass https://cn401smartot-production.up.railway.app/media/;
        proxy_set_header Host cn401smartot-production.up.railway.app;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
}
