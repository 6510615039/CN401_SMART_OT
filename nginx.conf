server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # React app
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Django (Railway private network)
    location /api/ {
        proxy_pass http://cn401smartot.railway.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket to Django Channels
    location /ws/ {
        proxy_pass http://cn401smartot.railway.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Django static files
    location /static/ {
        proxy_pass http://cn401smartot.railway.internal:8000/static/;
    }

    # Django media files
    location /media/ {
        proxy_pass http://cn401smartot.railway.internal:8000/media/;
    }
}
